name: Build model from source

# The current MLC HEAD/nightlies are broken by an in-progress apache-tvm-ffi
# migration (wheels: ABI mismatch; source HEAD: duplicate tvm-ffi registration).
# So we pin mlc-llm v0.19.0 — the last stable PRE-migration release — and build
# TVM + mlc-llm from source the classic way (self-consistent). CPU only;
# `mlc_llm compile --device webgpu` is codegen (emcc), no GPU needed. ~45 min.

on:
  workflow_dispatch:
    inputs:
      model_hf:  { description: "Base model", default: "Qwen/Qwen2.5-0.5B-Instruct" }
      arch:      { description: "arch",       default: "qwen2" }
      quant:     { description: "quant",      default: "q4f16_1" }
      name:      { description: "output name",default: "RecursiveMAS-0.5B" }
      upload_hf: { description: "upload to HF",type: boolean, default: true }

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential git \
            llvm-dev libedit-dev libxml2-dev zlib1g-dev libssl-dev
          # TVM static-links LLVM incl. Polly; llvm-dev doesn't ship libPolly.a
          LV=$(llvm-config --version | cut -d. -f1)
          echo "LLVM major: $LV"
          sudo apt-get install -y "libpolly-${LV}-dev" || sudo apt-get install -y libpolly-18-dev || true
          echo "libPolly.a: $(find /usr/lib -name 'libPolly.a' 2>/dev/null | head -1 || echo MISSING)"
          echo "llvm-config: $(llvm-config --version)"

      - name: Install Rust (latest stable; modern deps need >=1.85)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14
        with: { version: "3.1.56" }

      - name: Clone mlc-llm v0.19.0 (classic, pre-tvm-ffi)
        run: git clone --branch v0.19.0 --depth 1 --recursive --shallow-submodules https://github.com/mlc-ai/mlc-llm.git

      - name: Build TVM from source + install tvm python (~35 min)
        run: |
          set -e
          cd mlc-llm/3rdparty/tvm
          mkdir -p build
          cp cmake/config.cmake build/config.cmake
          {
            echo 'set(CMAKE_BUILD_TYPE RelWithDebInfo)'
            echo 'set(USE_LLVM "llvm-config --link-static")'
            echo 'set(HIDE_PRIVATE_SYMBOLS ON)'
            echo 'set(USE_CUDA OFF)'; echo 'set(USE_METAL OFF)'
            echo 'set(USE_VULKAN OFF)'; echo 'set(USE_OPENCL OFF)'
          } >> build/config.cmake
          (cd build && cmake .. -G Ninja && ninja)
          echo "TVM_HOME=$PWD" >> "$GITHUB_ENV"
          echo "TVM_LIBRARY_PATH=$PWD/build" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/build:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          pip install --upgrade pip
          export TVM_LIBRARY_PATH="$PWD/build"
          pip install -e ./python
          python -c "import tvm; print('TVM_OK', tvm.__file__)"

      - name: Build mlc-llm from source + install python
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          set -e
          cargo --version
          # v0.19 tokenizers-c trips the deny-by-default 'dangerous_implicit_autorefs'
          # lint on modern Rust. Cap lints to allow for that crate's cargo build.
          sed -i 's|set(TOKENIZERS_CPP_RUST_FLAGS "")|set(TOKENIZERS_CPP_RUST_FLAGS "--cap-lints=allow")|' \
            mlc-llm/3rdparty/tokenizers-cpp/CMakeLists.txt
          grep -n TOKENIZERS_CPP_RUST_FLAGS mlc-llm/3rdparty/tokenizers-cpp/CMakeLists.txt | head -1
          cd mlc-llm
          mkdir -p build
          {
            echo 'set(CMAKE_BUILD_TYPE RelWithDebInfo)'
            echo 'set(USE_LLVM "llvm-config --link-static")'
            echo 'set(HIDE_PRIVATE_SYMBOLS ON)'
            echo "set(TVM_SOURCE_DIR $PWD/3rdparty/tvm)"
            echo 'set(USE_CUDA OFF)'; echo 'set(USE_METAL OFF)'
            echo 'set(USE_VULKAN OFF)'; echo 'set(USE_OPENCL OFF)'
          } > build/config.cmake
          (cd build && cmake .. -G Ninja && ninja)
          pip install -e ./python
          pip install -U huggingface_hub
          python -c "import tvm; print('TVM_OK', tvm.__file__)"
          python -c "import mlc_llm; print('MLC_OK', mlc_llm.__file__)"

      - name: Patch model definition (expose hidden states)
        run: python expose_hidden.py --arch "${{ inputs.arch }}"

      - name: Download base weights
        run: hf download "${{ inputs.model_hf }}" --local-dir "hf/${{ inputs.name }}"

      - name: convert_weight + gen_config + compile (WebGPU wasm)
        run: |
          set -e
          OUT=dist-model; W="$OUT/${{ inputs.name }}-MLC"; L="$OUT/libs"
          mkdir -p "$W" "$L"
          mlc_llm convert_weight "hf/${{ inputs.name }}" --quantization "${{ inputs.quant }}" \
            --model-type "${{ inputs.arch }}" -o "$W"
          mlc_llm gen_config "hf/${{ inputs.name }}" --quantization "${{ inputs.quant }}" \
            --model-type "${{ inputs.arch }}" --conv-template "${{ inputs.arch }}" \
            --prefill-chunk-size 1024 -o "$W"
          mlc_llm compile "$W/mlc-chat-config.json" --device webgpu \
            -o "$L/${{ inputs.name }}-${{ inputs.quant }}-webgpu.wasm"
          ls -la "$L" "$W"

      - name: Upload weights to Hugging Face
        if: ${{ inputs.upload_hf }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ vars.HF_REPO }}
        run: hf upload "$HF_REPO" "dist-model/${{ inputs.name }}-MLC" . --token "$HF_TOKEN"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with: { name: "${{ inputs.name }}-mlc", path: dist-model, retention-days: 14 }

      - name: Attach wasm to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ inputs.name }}
          files: dist-model/libs/*.wasm
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
