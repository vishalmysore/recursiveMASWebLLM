name: Build ALL RecursiveMAS models

# Multi-model builder with a PICK-ONE dropdown (default) or an ALL fan-out.
#
# Uses the SAME working build method as build-source.yml: mlc-llm v0.19.0 built
# from source (the nightly wheels are broken by the tvm-ffi migration). CPU only;
# `mlc_llm compile --device webgpu` is codegen (emcc), no GPU. ~45 min per model.
#
# Pick one model  -> 1 job (fast).
# Pick "ALL"      -> 5 parallel jobs (same ~45 min wall-clock, 5 runners).
#
# build-source.yml (the working Qwen-only builder) is left untouched on purpose.

on:
  workflow_dispatch:
    inputs:
      model:
        description: "Which model to build"
        type: choice
        default: "Qwen2.5-1.5B"
        options:
          - "Qwen2.5-1.5B"
          - "Llama-3.2-1B"
          - "Gemma-2-2B"
          - "Phi-3-mini"
          - "TinyLlama-1.1B"
          - "ALL (parallel)"
      quant:
        description: "Quantization"
        default: "q4f16_1"
      upload_hf:
        description: "Upload weights to HF (needs HF_TOKEN secret + HF_NAMESPACE var, e.g. vishalmysore)"
        type: boolean
        default: false

permissions:
  contents: write   # needed to create the Release

jobs:
  # ── Turn the dropdown choice into a build matrix (1 entry, or all 5) ──────────
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.pick.outputs.matrix }}
    steps:
      - id: pick
        run: |
          QWEN='{"model_hf":"Qwen/Qwen2.5-1.5B-Instruct","arch":"qwen2","conv":"qwen2","name":"RecursiveMAS-Qwen2.5-1.5B"}'
          LLAMA='{"model_hf":"meta-llama/Llama-3.2-1B-Instruct","arch":"llama","conv":"llama-3","name":"RecursiveMAS-Llama3.2-1B"}'
          GEMMA='{"model_hf":"google/gemma-2-2b-it","arch":"gemma2","conv":"gemma_instruction","name":"RecursiveMAS-Gemma2-2B"}'
          PHI='{"model_hf":"microsoft/Phi-3-mini-4k-instruct","arch":"phi3","conv":"phi-3","name":"RecursiveMAS-Phi3-mini"}'
          TINY='{"model_hf":"TinyLlama/TinyLlama-1.1B-Chat-v1.0","arch":"llama","conv":"llama-2","name":"RecursiveMAS-TinyLlama-1.1B"}'
          case "${{ inputs.model }}" in
            "Qwen2.5-1.5B")   INC="[$QWEN]";;
            "Llama-3.2-1B")   INC="[$LLAMA]";;
            "Gemma-2-2B")     INC="[$GEMMA]";;
            "Phi-3-mini")     INC="[$PHI]";;
            "TinyLlama-1.1B") INC="[$TINY]";;
            *)                INC="[$QWEN,$LLAMA,$GEMMA,$PHI,$TINY]";;
          esac
          echo "matrix={\"include\":$INC}" >> "$GITHUB_OUTPUT"
          echo "Selected: ${{ inputs.model }} -> $INC"

  # ── Build each selected model (from source, classic pre-tvm-ffi mlc-llm) ──────
  build:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false          # one model failing must not cancel the others
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Free disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build build-essential git \
            llvm-dev libedit-dev libxml2-dev zlib1g-dev libssl-dev
          # TVM static-links LLVM incl. Polly; llvm-dev doesn't ship libPolly.a
          LV=$(llvm-config --version | cut -d. -f1)
          sudo apt-get install -y "libpolly-${LV}-dev" || sudo apt-get install -y libpolly-18-dev || true
          echo "libPolly.a: $(find /usr/lib -name 'libPolly.a' 2>/dev/null | head -1 || echo MISSING)"
          echo "llvm-config: $(llvm-config --version)"

      - name: Install Rust (latest stable; modern deps need >=1.85)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14
        with: { version: "3.1.56" }

      - name: Clone mlc-llm v0.19.0 (classic, pre-tvm-ffi)
        run: git clone --branch v0.19.0 --depth 1 --recursive --shallow-submodules https://github.com/mlc-ai/mlc-llm.git

      - name: Build TVM from source + install tvm python (~35 min)
        run: |
          set -e
          cd mlc-llm/3rdparty/tvm
          mkdir -p build
          cp cmake/config.cmake build/config.cmake
          {
            echo 'set(CMAKE_BUILD_TYPE RelWithDebInfo)'
            echo 'set(USE_LLVM "llvm-config --link-static")'
            echo 'set(HIDE_PRIVATE_SYMBOLS ON)'
            echo 'set(USE_CUDA OFF)'; echo 'set(USE_METAL OFF)'
            echo 'set(USE_VULKAN OFF)'; echo 'set(USE_OPENCL OFF)'
          } >> build/config.cmake
          (cd build && cmake .. -G Ninja && ninja)
          echo "TVM_HOME=$PWD" >> "$GITHUB_ENV"
          echo "TVM_LIBRARY_PATH=$PWD/build" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=$PWD/build:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"
          pip install --upgrade pip
          export TVM_LIBRARY_PATH="$PWD/build"
          pip install -e ./python
          python -c "import tvm; print('TVM_OK', tvm.__file__)"

      - name: Build mlc-llm from source + install python
        env:
          CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
        run: |
          set -e
          cargo --version
          # v0.19 tokenizers-c trips the deny-by-default 'dangerous_implicit_autorefs'
          # lint on modern Rust. Cap lints to allow for that crate's cargo build.
          sed -i 's|set(TOKENIZERS_CPP_RUST_FLAGS "")|set(TOKENIZERS_CPP_RUST_FLAGS "--cap-lints=allow")|' \
            mlc-llm/3rdparty/tokenizers-cpp/CMakeLists.txt
          cd mlc-llm
          mkdir -p build
          {
            echo 'set(CMAKE_BUILD_TYPE RelWithDebInfo)'
            echo 'set(USE_LLVM "llvm-config --link-static")'
            echo 'set(HIDE_PRIVATE_SYMBOLS ON)'
            echo "set(TVM_SOURCE_DIR $PWD/3rdparty/tvm)"
            echo 'set(USE_CUDA OFF)'; echo 'set(USE_METAL OFF)'
            echo 'set(USE_VULKAN OFF)'; echo 'set(USE_OPENCL OFF)'
          } > build/config.cmake
          (cd build && cmake .. -G Ninja && ninja)
          pip install -e ./python
          pip install -U huggingface_hub
          python -c "import mlc_llm; print('MLC_OK', mlc_llm.__file__)"

      - name: Patch model definition (expose hidden states)
        run: python expose_hidden.py --arch "${{ matrix.arch }}"

      - name: Download base weights
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}   # required for gated repos (Llama, Gemma)
        run: hf download "${{ matrix.model_hf }}" --local-dir "hf/${{ matrix.name }}"

      - name: convert_weight + gen_config + compile (WebGPU wasm)
        run: |
          set -e
          export MLC_LLM_SOURCE_DIR="$PWD/mlc-llm"
          (cd mlc-llm/web && TVM_SOURCE_DIR="$TVM_HOME" make dist/wasm/mlc_wasm_runtime.bc)
          (cd "$TVM_HOME/web" && make dist/wasm/wasm_runtime.bc dist/wasm/tvmjs_support.bc dist/wasm/webgpu_runtime.bc)
          cp "$TVM_HOME"/web/dist/wasm/*.bc "$TVM_HOME/build/"
          OUT=dist-model; W="$OUT/${{ matrix.name }}-MLC"; L="$OUT/libs"
          mkdir -p "$W" "$L"
          mlc_llm convert_weight "hf/${{ matrix.name }}" --quantization "${{ inputs.quant }}" \
            --model-type "${{ matrix.arch }}" -o "$W"
          mlc_llm gen_config "hf/${{ matrix.name }}" --quantization "${{ inputs.quant }}" \
            --model-type "${{ matrix.arch }}" --conv-template "${{ matrix.conv }}" \
            --prefill-chunk-size 1024 -o "$W"
          # Export latent funcs (get_last_hidden, decode_last_hidden) before compile.
          python patch_config_exports.py "$W/mlc-chat-config.json"
          mlc_llm compile "$W/mlc-chat-config.json" --device webgpu \
            -o "$L/${{ matrix.name }}-${{ inputs.quant }}-webgpu.wasm"
          ls -la "$L" "$W"

      # Save outputs FIRST and unconditionally so a bad HF token never loses a build.
      - name: Upload artifacts (wasm + weights)
        if: always()
        uses: actions/upload-artifact@v4
        with: { name: "${{ matrix.name }}-mlc", path: dist-model, retention-days: 14 }

      - name: Attach wasm to a Release
        if: always()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ matrix.name }}
          files: dist-model/libs/*.wasm
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

      - name: Upload weights to Hugging Face (optional; needs a Write token)
        if: ${{ always() && inputs.upload_hf }}
        continue-on-error: true
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}        # repo secret
          HF_NAMESPACE: ${{ vars.HF_NAMESPACE }}   # repo variable, e.g. vishalmysore
        run: hf upload "$HF_NAMESPACE/${{ matrix.name }}-MLC" "dist-model/${{ matrix.name }}-MLC" . --token "$HF_TOKEN"
