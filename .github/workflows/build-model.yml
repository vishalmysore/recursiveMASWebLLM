name: Build RecursiveMAS model

# Compile a latent-transfer-capable WebLLM model on a (free, CPU) Ubuntu runner.
# `mlc_llm compile` is code generation — it emits the WebGPU wasm WITHOUT needing a
# GPU. convert_weight + gen_config also run on CPU for small models.

on:
  workflow_dispatch:
    inputs:
      model_hf:
        description: "Base model on Hugging Face"
        default: "Qwen/Qwen2.5-0.5B-Instruct"
      arch:
        description: "mlc_llm model arch (must match expose_hidden.py)"
        default: "qwen2"
      quant:
        description: "Quantization"
        default: "q4f16_1"
      name:
        description: "Output model name"
        default: "RecursiveMAS-0.5B"
      train_link:
        description: "Also CPU-train the RecursiveLink (slow; default off)"
        type: boolean
        default: false
      upload_hf:
        description: "Upload weights to HF (needs HF_TOKEN secret + HF_REPO var)"
        type: boolean
        default: false

permissions:
  contents: write   # needed to create/update Releases

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          df -h

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Setup emscripten
        uses: mymindstorm/setup-emsdk@v14
        with: { version: "3.1.56" }

      - name: Install MLC toolchain (CPU nightly)
        run: |
          python -m pip install --upgrade pip
          # CPU wheels are enough to compile the WebGPU wasm — no GPU needed.
          pip install --pre -U -f https://mlc.ai/wheels mlc-llm-nightly-cpu mlc-ai-nightly-cpu
          pip install -U "huggingface_hub[cli]"
          # libmlc_llm.so needs libtvm.so at load time — diagnose and self-heal.
          SP=$(python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")
          echo "=== libtvm* files ==="; find "$SP" -name "libtvm*" 2>/dev/null || true
          TVM_DIRS=$(python -c "
          import glob, os, sysconfig
          sp = sysconfig.get_paths()['purelib']
          dirs = sorted({os.path.dirname(p) for p in glob.glob(os.path.join(sp,'**','libtvm*'), recursive=True)})
          print(':'.join(dirs))
          ")
          echo "TVM_DIRS=$TVM_DIRS"
          [ -n "$TVM_DIRS" ] && echo "LD_LIBRARY_PATH=$TVM_DIRS:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          # Fallback: symlink libtvm_runtime.so → libtvm.so if missing.
          if ! find "$SP" -name "libtvm.so" -print -quit | grep -q .; then
            RT=$(find "$SP" -name "libtvm_runtime.so" -print -quit)
            if [ -n "$RT" ]; then ln -sf "$RT" "$(dirname "$RT")/libtvm.so"; echo "symlinked libtvm.so -> $RT"; fi
          fi
          python -c "import tvm; print('tvm', tvm.__file__)"
          python -c "import mlc_llm; print('mlc_llm', mlc_llm.__file__)"

      - name: Patch model definition (expose hidden states)
        run: python expose_hidden.py --arch "${{ inputs.arch }}"

      - name: Download base weights
        run: |
          huggingface-cli download "${{ inputs.model_hf }}" \
            --local-dir "hf/${{ inputs.name }}"

      - name: convert_weight + gen_config + compile (WebGPU wasm)
        run: |
          set -e
          OUT=dist-model
          W="$OUT/${{ inputs.name }}-MLC"
          L="$OUT/libs"
          mkdir -p "$W" "$L"
          mlc_llm convert_weight "hf/${{ inputs.name }}" \
            --quantization "${{ inputs.quant }}" \
            --model-type "${{ inputs.arch }}" \
            -o "$W"
          mlc_llm gen_config "hf/${{ inputs.name }}" \
            --quantization "${{ inputs.quant }}" \
            --model-type "${{ inputs.arch }}" \
            --conv-template "${{ inputs.arch }}" \
            --prefill-chunk-size 1024 \
            -o "$W"
          mlc_llm compile "$W/mlc-chat-config.json" \
            --device webgpu \
            -o "$L/${{ inputs.name }}-${{ inputs.quant }}-webgpu.wasm"
          ls -la "$L" "$W"

      - name: Train RecursiveLink (optional, CPU)
        if: ${{ inputs.train_link }}
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers
          python train_recursivelink.py \
            --model "${{ inputs.model_hf }}" \
            --out dist-model/recursivelink.json

      - name: Upload weights to Hugging Face (optional)
        if: ${{ inputs.upload_hf }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO:  ${{ vars.HF_REPO }}
        run: |
          # huggingface-cli picks up HF_TOKEN from the environment automatically.
          huggingface-cli upload "$HF_REPO" "dist-model/${{ inputs.name }}-MLC"

      - name: Upload build artifacts (wasm + weights + link)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}-mlc
          path: dist-model
          retention-days: 14

      - name: Attach wasm (and link if trained) to a Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-${{ inputs.name }}
          generate_release_notes: false
          fail_on_unmatched_files: false
          files: |
            dist-model/libs/*.wasm
            dist-model/recursivelink.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
