name: Smoke-test MLC toolchain

# Quick CI check (~10 min) that verifies the MLC toolchain installs correctly
# and that `import tvm` / `import mlc_llm` both succeed. Runs on every push
# so we catch regressions before triggering the full 350-minute build.

on:
  push:
    branches:
      - copilot/fix-github-actions-build-job
      - main
  pull_request:
    branches:
      - main

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }

      - name: Install MLC toolchain (CPU nightly)
        run: |
          python -m pip install --upgrade pip
          pip install --pre -U -f https://mlc.ai/wheels mlc-llm-nightly-cpu mlc-ai-nightly-cpu
          pip install -U huggingface_hub

          SP=$(python -c "import sysconfig; print(sysconfig.get_paths()['purelib'])")

          echo "=== Before cleanup ==="
          find "$SP" -name "libtvm*" 2>/dev/null || true

          # Keep Python 'tvm' package, only remove duplicate native libraries.
          # Step 1: Remove conflicting runtime libs outside mlc_llm and tvm directories.
          find "$SP" -name "libtvm_runtime.so" ! -path "*/mlc_llm/*" ! -path "*/tvm/*" -delete || true
          find "$SP" -name "libtvm_runtime_*.so" -delete || true   # extra variants

          # Step 2: Replace tvm's own libtvm_runtime.so with a symlink to mlc_llm's copy
          #         so only one native library is loaded (avoiding duplicate-registration SIGABRT).
          MLC_RT="$SP/mlc_llm/lib/libtvm_runtime.so"
          TVM_RT="$SP/tvm/lib/libtvm_runtime.so"

          if [ -f "$MLC_RT" ] && [ -f "$TVM_RT" ]; then
            echo "Replacing duplicate tvm runtime with absolute symlink to mlc_llm copy..."
            rm -f "$TVM_RT"
            ln -sf "$MLC_RT" "$TVM_RT"
          fi

          # Step 3: Create libtvm.so symlinks for remaining libtvm_runtime.so files.
          for RT in $(find "$SP" -name "libtvm_runtime.so" 2>/dev/null); do
            D=$(dirname "$RT")
            [ -e "$D/libtvm.so" ] || ln -sf libtvm_runtime.so "$D/libtvm.so"
          done

          echo "=== After cleanup ==="
          find "$SP" -name "libtvm*" 2>/dev/null || true

          # Prioritize mlc_llm libs
          TVM_DIRS=$(python -c "
          import glob, os, sysconfig
          sp = sysconfig.get_paths()['purelib']
          dirs = {os.path.dirname(p) for p in glob.glob(os.path.join(sp, '**', 'libtvm*.so'), recursive=True)}
          print(':'.join(sorted(dirs)))
          ")

          export LD_LIBRARY_PATH="${TVM_DIRS:+$TVM_DIRS:}$LD_LIBRARY_PATH"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

          python -c "import tvm; print('✅ tvm imported', tvm.__file__)"
          python -c "import mlc_llm; print('✅ mlc_llm imported', mlc_llm.__file__)"

      - name: Verify mlc_llm CLI
        run: mlc_llm --help | head -10

      - name: Patch model definition (expose hidden states)
        run: python expose_hidden.py --arch qwen2

      - name: Check mlc_llm model module is importable
        run: |
          python -c "
          import mlc_llm.model.qwen2.qwen2_model as m
          print('✅ mlc_llm.model.qwen2 importable:', m.__file__)
          src = open(m.__file__).read()
          assert 'get_last_hidden' in src, 'get_last_hidden not patched in!'
          print('✅ expose_hidden.py patch verified')
          "
